<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel de Administración</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header i {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .login-header h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }

        input {
            width: 100%;
            padding: 1rem 1rem 1rem 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .alert.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
        }

        .alert.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .credentials-info {
            background: #f0f4ff;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border-left: 4px solid #667eea;
        }

        .credentials-info p {
            margin: 0;
            color: #555;
            font-size: 0.9rem;
        }

        .credentials-info strong {
            color: #667eea;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-shield-alt"></i>
            <h1>Panel de Administración</h1>
            <p>FONT MULTISERVEIS</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Usuario
                </label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" required autocomplete="username" autofocus>
                </div>
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Contraseña
                </label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>
        </form>

        <div class="back-link">
            <a href="#" id="forgotPasswordLink"
                style="display: block; margin-bottom: 0.5rem; color: #666; font-size: 0.9rem;">
                ¿Has olvidado tu contraseña?
            </a>
            <a href="/">
                <i class="fas fa-arrow-left"></i> Volver a la página principal
            </a>
        </div>
    </div>

    <!-- Modal Recuperación -->
    <div id="forgotModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div
            style="background: white; padding: 2rem; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <h2 style="margin-bottom: 1rem; font-size: 1.5rem; color: #333;">Recuperar Contraseña</h2>
            <p style="margin-bottom: 1.5rem; color: #666; font-size: 0.9rem;">Introduce tu nombre de usuario para
                recibir un enlace de recuperación.</p>
            <div class="form-group">
                <input type="text" id="recoveryUsername" placeholder="Nombre de usuario" style="padding: 0.8rem 1rem;">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 1.5rem;">
                <button id="cancelRecovery"
                    style="flex: 1; padding: 0.8rem; border: 1px solid #ddd; background: #f9f9f9; border-radius: 8px; cursor: pointer;">Cancelar</button>
                <button id="sendRecovery"
                    style="flex: 2; padding: 0.8rem; border: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 8px; cursor: pointer; font-weight: bold;">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');
        const forgotModal = document.getElementById('forgotModal');
        const cancelRecovery = document.getElementById('cancelRecovery');
        const sendRecovery = document.getElementById('sendRecovery');

        forgotPasswordLink.addEventListener('click', (e) => {
            e.preventDefault();
            forgotModal.style.display = 'flex';
        });

        cancelRecovery.addEventListener('click', () => {
            forgotModal.style.display = 'none';
        });

        sendRecovery.addEventListener('click', async () => {
            const username = document.getElementById('recoveryUsername').value;
            if (!username) {
                alert('Por favor, introduce tu usuario');
                return;
            }

            sendRecovery.disabled = true;
            sendRecovery.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                const data = await response.json();

                // Show notification (reusing alert element from login)
                const mainAlert = document.getElementById('alert');
                mainAlert.className = response.ok ? 'alert success' : 'alert error';
                mainAlert.textContent = response.ok ? '✓ ' + data.message : '✗ ' + data.message;
                mainAlert.style.display = 'block';

                forgotModal.style.display = 'none';
            } catch (error) {
                console.error('Error:', error);
                window.alert('Error al procesar la solicitud');
            } finally {
                sendRecovery.disabled = false;
                sendRecovery.innerHTML = 'Enviar';
            }
        });
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const alert = document.getElementById('alert');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert.className = 'alert error';
                alert.textContent = '✗ Por favor, introduce tu usuario y contraseña';
                alert.style.display = 'block';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Iniciando sesión...';
            alert.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert.className = 'alert success';
                    alert.textContent = '✓ ' + data.message + ' Redirigiendo...';
                    alert.style.display = 'block';

                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 1000);
                } else {
                    throw new Error(data.message || 'Error al iniciar sesión');
                }
            } catch (error) {
                alert.className = 'alert error';
                alert.textContent = '✗ ' + error.message;
                alert.style.display = 'block';

                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar Sesión';
            }
        });
    </script>
</body>

</html>
