<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - FONT MULTISERVEIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .header h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #444;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .alert.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
        }

        .alert.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-key"></i>
            <h1>Nueva Contraseña</h1>
            <p>Elige tu nueva contraseña de acceso</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="password">Nueva Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 8 caracteres">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn" id="submitBtn">Cambiar Contraseña</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="/login.html" style="color: #667eea; text-decoration: none; font-size: 0.9rem;">Volver al login</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const resetForm = document.getElementById('resetForm');
        const alertBox = document.getElementById('alert');
        const submitBtn = document.getElementById('submitBtn');

        if (!token) {
            alertBox.className = 'alert error';
            alertBox.textContent = '✗ Token de recuperación no encontrado';
            alertBox.style.display = 'block';
            resetForm.style.display = 'none';
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alertBox.className = 'alert error';
                alertBox.textContent = '✗ Las contraseñas no coinciden';
                alertBox.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Procesando...';

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alertBox.className = 'alert success';
                    alertBox.textContent = '✓ ' + data.message;
                    alertBox.style.display = 'block';
                    resetForm.style.display = 'none';
                    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
                } else {
                    alertBox.className = 'alert error';
                    alertBox.textContent = '✗ ' + (data.error || 'Error al cambiar contraseña');
                    if (data.details) {
                        alertBox.textContent += ': ' + data.details.join(', ');
                    }
                    alertBox.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Cambiar Contraseña';
                }
            } catch (error) {
                alertBox.className = 'alert error';
                alertBox.textContent = '✗ Error de conexión';
                alertBox.style.display = 'block';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
